name: blue_whale
description: A clean, scalable, and refreshingly intuitive state management, dependency injection, and navigation plugin for Flutter. Dive into a smoother development experience!
version: 1.0.0 # Incrementing since 0.0.2 is already taken on pub.dev
homepage: https://mobdevs.solutions # Your specified homepage

environment:
  sdk: '>=3.4.3 <4.0.0' # Your SDK constraint
  flutter: '>=3.3.0'    # Your Flutter constraint

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  shared_preferences: ^2.5.4
  # plugin_platform_interface: ^2.0.2 # REMOVE THIS LINE - It's not needed for blue_whale

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

